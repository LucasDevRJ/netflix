<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Netflix</title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/tema-claro.css">
        <link rel="icon" href="assets/images/logo.png" type="image/x-icon">
    </head>
    <body>
        <main>
            <header>
                <h1>Quem está assistindo?</h1>
                <img id="botaoAlterarTema" src="assets/images/tema-claro.png" alt="Alterar Tema">
            </header>
            <section class="perfis">
                <ul class="perfis-lista">
                    <li class="perfil">
                        <img src="assets/images/perfil-1.jpg" alt="Perfil do primeiro usuário">
                        <p>Perfil 1</p>
                    </li>
                    <li class="perfil">
                        <img src="assets/images/perfil-2.jpg" alt="Perfil do segundo usuário">
                        <p>Perfil 2</p>
                    </li>
                    <li class="perfil">
                        <img src="assets/images/perfil-3.jpg" alt="Perfil do terceiro usuário">
                        <p>Perfil 3</p>
                    </li>
                </ul>
            </section>

            <footer class="divisao-botao">
                <button class="botao">Gerenciar Perfis</button>
            </footer>
        </main>
        <script src="javaScript/temaClaro.js"></script>
    </body>
</html>
